name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      packages: write

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧪 Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
          cache-image: false

      - name: 🧪 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔒 Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build container and push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            TAG=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: 🩺 Smoke test pushed image
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
          for platform in linux/amd64 linux/arm64; do
            docker run --rm --pull always --platform "${platform}" --entrypoint /bin/sh "${image}" -c '
              set -eu
              test -s /app/podsync
              /app/podsync --help >/tmp/podsync-help.txt 2>&1 || true
              grep -q "Usage:" /tmp/podsync-help.txt
              /usr/local/bin/youtube-dl --version >/dev/null
            '
          done

      - name: 🚧️ Make release
        uses: goreleaser/goreleaser-action@v7
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest
          args: release --clean
